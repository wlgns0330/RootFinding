name: Docs
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14t"
      - name: Install dependencies
        run: uv sync --frozen --group docs
      - name: Build docs
        run: uv run sphinx-build docs/source docs/_build/html